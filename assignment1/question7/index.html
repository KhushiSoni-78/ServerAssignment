<!DOCTYPE html>
<html>
<head>
    <title>Employee Registration Form</title>
</head>
<body>
    <h2><font color="red">Employee Registration Form</font></h2>
    <form action="#" method="post" enctype="multipart/form-data">
        <table>
            <tr>
                <td></td>
                <td>
                    <input type="radio" name="title" value="Mr."> Mr.
                    <input type="radio" name="title" value="Mrs."> Mrs.
                    <input type="radio" name="title" value="Ms."> Ms.
                </td>
            </tr>
            <tr>
                <td><b>First Name</b></td>
                <td><input type="text" name="firstname" placeholder="First Name"></td>
            </tr>
            <tr>
                <td><b>Last Name</b></td>
                <td><input type="text" name="lastname" placeholder="Last Name"></td>
            </tr>
            <tr>
                <td><b>Mail Address1</b></td>
                <td><input type="text" name="address1"></td>
            </tr>
            <tr>
                <td><b>Mail Address2</b></td>
                <td><input type="text" name="address2"></td>
            </tr>
            <tr>
                <td><b>City</b></td>
                <td><input type="text" name="city"></td>
            </tr>
            <tr>
                <td><b>State</b></td>
                <td>
                    <select name="state">
                        <option value="Gujarat" selected>Gujarat</option>
                        <option value="Maharashtra">Maharashtra</option>
                        <option value="Rajasthan">Rajasthan</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td><b>Zip</b></td>
                <td><input type="text" name="zip"></td>
            </tr>
            <tr>
                <td><b>Upload Photo</b></td>
                <td><input type="file" name="photo"></td>
            </tr>
            <tr>
                <td><b>E-Mail</b></td>
                <td><input type="email" name="email"></td>
            </tr>
            <tr>
                <td><b>Mobile</b></td>
                <td><input type="text" name="mobile" value="+91"></td>
            </tr>
            <tr>
                <td valign="top"><b>Languages known</b></td>
                <td>
                    <input type="checkbox" name="lang" value="Gujarati" checked> Gujarati<br>
                    <input type="checkbox" name="lang" value="Hindi" checked> Hindi<br>
                    <input type="checkbox" name="lang" value="English" checked> English<br>
                    <input type="checkbox" name="lang" value="Marathi"> Marathi
                </td>
            </tr>
            <tr>
                <td valign="top"><b>Additional Information</b></td>
                <td>
                    <textarea name="info" rows="4" cols="30" placeholder="Optional"></textarea>
                </td>
            </tr>
            <tr>
                <td></td>
                <td>
                    <input type="submit" value="submit">
                    <input type="reset" value="reset">
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
